<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barony Game - Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🏰 Barony</h1>

        <div th:if="${error}" class="error">
            <p th:text="${error}"></p>
        </div>

        <div id="formNotice" class="notice" role="status" style="display: none;"></div>

        <div id="formError" class="error" role="alert" style="display: none;">
            <p id="formErrorText"></p>
        </div>

        <form id="loginForm" onsubmit="return login(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required
                       placeholder="Your username"
                       minlength="3"
                       maxlength="50"
                       autocomplete="username"
                       autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required
                       placeholder="Your password"
                       minlength="8"
                       autocomplete="current-password">
            </div>

            <button type="submit">Log In</button>
        </form>

        <div class="info">
            <p>Don't have an account? <a th:href="@{/register}">Create one</a>.</p>
            <p>Your game progress is saved to your account.</p>
        </div>
    </div>

    <script>
        function showFormError(message) {
            const box = document.getElementById('formError');
            document.getElementById('formErrorText').textContent = message;
            box.style.display = 'block';
        }

        function clearFormError() {
            document.getElementById('formError').style.display = 'none';
        }

        function login(event) {
            event.preventDefault();
            clearFormError();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showFormError('Please enter your username and password.');
                return false;
            }

            const submitBtn = document.querySelector('#loginForm button[type="submit"]');
            const restoreBtn = setButtonBusy(submitBtn, 'Logging in…');

            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(response => response.json().then(data => ({ ok: response.ok, data: data })))
            .then(result => {
                if (!result.ok) {
                    const msg = (result.data && (result.data.message || result.data.error)) || 'Login failed';
                    throw new Error(msg);
                }
                // Store the UserAuth-issued JWT and username
                localStorage.setItem('token', result.data.token);
                localStorage.setItem('username', username);
                if (result.data.expiresAt) {
                    localStorage.setItem('tokenExpiresAt', result.data.expiresAt);
                }
                window.location.href = '/game';
            })
            .catch(error => {
                console.error('Login error:', error);
                showFormError(error.message || 'Login failed. Please try again.');
                restoreBtn();
            });

            return false;
        }

        // Disable a submit button and show a pending label so the player gets
        // immediate feedback and can't double-submit; returns a restore fn.
        function setButtonBusy(button, busyLabel) {
            const originalLabel = button.textContent;
            button.disabled = true;
            button.textContent = busyLabel;
            return function () {
                button.disabled = false;
                button.textContent = originalLabel;
            };
        }

        // Pick up a one-time handoff from register/logout: show why we're here
        // and pre-fill the username so the player doesn't retype it.
        document.addEventListener('DOMContentLoaded', function () {
            const notice = sessionStorage.getItem('authNotice');
            if (notice) {
                const box = document.getElementById('formNotice');
                box.textContent = notice;
                box.style.display = 'block';
                sessionStorage.removeItem('authNotice');
            }
            const prefill = sessionStorage.getItem('prefillUsername');
            if (prefill) {
                document.getElementById('username').value = prefill;
                document.getElementById('password').focus();
                sessionStorage.removeItem('prefillUsername');
            }
        });
    </script>
</body>
</html>
