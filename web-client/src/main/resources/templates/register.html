<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barony Game - Register</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🏰 Barony</h1>

        <div id="formError" class="error" role="alert" style="display: none;">
            <p id="formErrorText"></p>
        </div>

        <form id="registerForm" onsubmit="return register(event)">
            <div class="form-group">
                <label for="username">Choose a Username</label>
                <input type="text" id="username" name="username" required
                       placeholder="3–50 characters"
                       minlength="3"
                       maxlength="50"
                       autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Choose a Password</label>
                <input type="password" id="password" name="password" required
                       placeholder="At least 8 characters"
                       minlength="8"
                       autocomplete="new-password">
            </div>

            <button type="submit">Create Account</button>
        </form>

        <div class="info">
            <p>Already have an account? <a th:href="@{/login}">Log in</a>.</p>
        </div>
    </div>

    <script>
        function showFormError(message) {
            const box = document.getElementById('formError');
            document.getElementById('formErrorText').textContent = message;
            box.style.display = 'block';
        }

        function clearFormError() {
            document.getElementById('formError').style.display = 'none';
        }

        function register(event) {
            event.preventDefault();
            clearFormError();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showFormError('Please choose a username and password.');
                return false;
            }

            const submitBtn = document.querySelector('#registerForm button[type="submit"]');
            const restoreBtn = setButtonBusy(submitBtn, 'Creating account…');

            fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(response => response.json().then(data => ({ ok: response.ok, data: data })))
            .then(result => {
                if (!result.ok) {
                    const msg = (result.data && (result.data.message || result.data.error)) || 'Registration failed';
                    throw new Error(msg);
                }
                // Registration succeeded; hand off to the login screen with a
                // success notice and the username pre-filled so the player can
                // log in without retyping it.
                sessionStorage.setItem('authNotice', 'Account created — please log in.');
                sessionStorage.setItem('prefillUsername', username);
                window.location.href = '/login';
            })
            .catch(error => {
                console.error('Registration error:', error);
                showFormError(error.message || 'Registration failed. Please try again.');
                restoreBtn();
            });

            return false;
        }

        // Disable a submit button and show a pending label so the player gets
        // immediate feedback and can't double-submit; returns a restore fn.
        function setButtonBusy(button, busyLabel) {
            const originalLabel = button.textContent;
            button.disabled = true;
            button.textContent = busyLabel;
            return function () {
                button.disabled = false;
                button.textContent = originalLabel;
            };
        }
    </script>
</body>
</html>
