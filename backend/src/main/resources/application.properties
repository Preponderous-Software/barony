server.port=8080

# Base URL of the standalone UserAuth service used for authentication.
# In docker-compose this is overridden to http://userauth:9998.
userauth.url=${USERAUTH_URL:http://localhost:9998}

# Mark the auth cookie Secure (HTTPS-only). False for local HTTP dev; set true
# in production (over HTTPS) via AUTH_COOKIE_SECURE.
auth.cookie.secure=${AUTH_COOKIE_SECURE:false}
