server.port=8080

# Base URL of the standalone UserAuth service used for authentication.
# In docker-compose this is overridden to http://userauth:9998.
userauth.url=${USERAUTH_URL:http://localhost:9998}

# Mark the auth cookie Secure (HTTPS-only). False for local HTTP dev; set true
# in production (over HTTPS) via AUTH_COOKIE_SECURE.
auth.cookie.secure=${AUTH_COOKIE_SECURE:false}

# Persistence. Defaults to a file-backed embedded H2 database under ./data so saved
# games survive restarts (mount that directory as a volume in production). Set DB_URL
# (+ DB_USERNAME/DB_PASSWORD) to use Postgres instead.
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/barony}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
