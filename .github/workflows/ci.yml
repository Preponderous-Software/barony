name: CI Build and Test

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  backend:
    name: Backend Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Build backend
      run: |
        cd backend
        mvn clean compile
        
    - name: Run backend tests
      run: |
        cd backend
        mvn test
        
    - name: Package backend
      run: |
        cd backend
        mvn package -DskipTests

  web-client:
    name: Web Client Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Build web-client
      run: |
        cd web-client
        mvn clean compile
        
    - name: Run web-client tests
      run: |
        cd web-client
        mvn test
        
    - name: Package web-client
      run: |
        cd web-client
        mvn package -DskipTests
